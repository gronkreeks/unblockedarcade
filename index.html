<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade</title>
  <link rel="icon" href="favicon.ico">

  <!-- Open Graph / Discord / iMessage embed -->

  <meta property="og:url"         content="https://unblockedarcade.org/">
  <meta property="og:title"       content="Unblocked Arcade">
  <meta property="og:description" content="Free multiplayer and singleplayer browser games. No downloads, no login — just play.">
  <meta property="og:image"       content="https://unblockedarcade.org/embed.png">

  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Unblocked Arcade">
  <meta name="twitter:description" content="Free multiplayer and singleplayer browser games. No downloads, no login — just play.">
  <meta name="twitter:image"       content="https://unblockedarcade.org/embed.png">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9603713606760464" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Sky ── */
    .sky {
      width: 100%;
      background: linear-gradient(to bottom, #5bc8f5, #a8dff7);
      padding: 2rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 50px;
      pointer-events: none;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
    }
    .c1 { width:120px; height:36px; top:30px;  left:5%;  }
    .c1::before { width:60px;  height:60px;  top:-30px; left:15px; }
    .c1::after  { width:50px;  height:50px;  top:-22px; left:55px; }

    .c2 { width:100px; height:30px; top:55px;  left:30%; }
    .c2::before { width:50px;  height:50px;  top:-26px; left:10px; }
    .c2::after  { width:44px;  height:44px;  top:-20px; left:46px; }

    .c3 { width:130px; height:38px; top:20px;  right:8%; }
    .c3::before { width:64px;  height:64px;  top:-34px; left:18px; }
    .c3::after  { width:52px;  height:52px;  top:-24px; left:64px; }

    .c4 { width:90px;  height:28px; top:70px;  right:28%; }
    .c4::before { width:46px;  height:46px;  top:-24px; left:8px;  }
    .c4::after  { width:38px;  height:38px;  top:-18px; left:42px; }

    /* Title */
    .logo {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.1);
      margin-bottom: 0.3rem;
      position: relative;
      z-index: 1;
    }

    .tagline {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* ── Grass strip ── */
    .grass {
      width: 100%;
      background: #4caf50;
      height: 24px;
      position: relative;
      flex-shrink: 0;
    }
    .grass::before {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 0; right: 0;
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        #4caf50 0px, #4caf50 8px,
        transparent 8px, transparent 14px
      );
      mask-image: repeating-linear-gradient(
        90deg,
        black 0px, black 8px,
        transparent 8px, transparent 14px
      );
    }
    .grass::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      height: 12px;
      background: #388e3c;
    }

    /* ── Ground / game area ── */
    .ground {
      width: 100%;
      background: #8B5E3C;
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 3rem;
      gap: 1.8rem;
    }

    /* Centre column */
    .ground-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    /* ── Game grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 160px));
      gap: 1.2rem;
      width: 100%;
      max-width: 900px;
      justify-content: center;
    }

    .card {
      position: relative;
      padding: 2rem 1.5rem 1.6rem;
      border-radius: 20px;
      text-decoration: none;
      color: #fff;
      text-align: center;
      transition: transform 0.18s, box-shadow 0.18s;
      overflow: hidden;
      cursor: pointer;
      border-bottom: 5px solid rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: rgba(255,255,255,0);
      transition: background 0.18s;
    }
    .card:hover::after  { background: rgba(255,255,255,0.1); }
    .card:hover { transform: translateY(-8px); }

    /* Card colours — add more as needed */
    .card-tag    { background: linear-gradient(160deg, #e74c3c, #c0392b); box-shadow: 0 6px 20px rgba(231,76,60,0.45); }
    .card-coming { background: linear-gradient(160deg, #7f8c8d, #5d6d7e); box-shadow: 0 6px 20px rgba(100,100,100,0.3); }

    .card:hover.card-tag    { box-shadow: 0 14px 36px rgba(231,76,60,0.6); }

    .icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 0.8rem;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25));
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 0.45rem;
    }

    .card-desc {
      font-size: 0.8rem;
      opacity: 0.85;
      line-height: 1.55;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      margin-top: auto;
      padding-top: 1rem;
      padding: 0.25rem 0.9rem;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(0,0,0,0.22);
      border: 2px solid rgba(255,255,255,0.3);
    }

    .card-recommended {
      outline: 3px solid #ffd700;
      outline-offset: 2px;
      box-shadow: 0 0 0 3px #ffd700, 0 6px 20px rgba(39,174,96,0.45);
    }
    .badge-mobile {
      display: inline-block;
      margin-top: 0.4rem;
      margin-left: 0.3rem;
      padding: 0.18rem 0.6rem;
      border-radius: 50px;
      font-size: 0.58rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      vertical-align: middle;
    }

    .card-recommended::before {
      content: '★ Recommended';
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      background: #ffd700;
      color: #1a1a1a;
      font-size: 0.55rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="sky">

    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
    <div class="logo">ARCADE</div>
    <p class="tagline">pick a game and play</p>
  </div>

  <div class="grass"></div>

  <div class="ground">

    <!-- Centre: section label + game grid -->
    <div class="ground-main">
      <p class="section-label">2 Player Games</p>
      <div class="grid">

        <a class="card card-tag" href="tag.html">
          <span class="icon">🏃</span>
          <div class="card-title">Tag</div>
          <span class="badge">2 Players</span>
        </a>

        <a class="card card-tag" href="battle.html" style="background:linear-gradient(160deg,#e67e22,#ca6f1e);box-shadow:0 6px 20px rgba(230,126,34,0.45)">
          <span class="icon">⚔️</span>
          <div class="card-title">Battle</div>
          <span class="badge">2 Players</span>
          <span class="badge-mobile">📱 Mobile</span>
        </a>

        <a class="card card-tag" href="sniper.html" style="background:linear-gradient(160deg,#27ae60,#1e8449);box-shadow:0 6px 20px rgba(39,174,96,0.45)">
          <span class="icon">🎯</span>
          <div class="card-title">Sniper</div>
          <span class="badge">2 Players</span>
        </a>

        <a class="card card-tag" href="boxing.html" style="background:linear-gradient(160deg,#e74c3c,#8e0000);box-shadow:0 6px 20px rgba(231,76,60,0.45)">
          <span class="icon">🥊</span>
          <div class="card-title">Boxing</div>
          <span class="badge">2 Players</span>
        </a>

        <a class="card card-tag" href="chess.html" style="background:linear-gradient(160deg,#5d4037,#3e2723);box-shadow:0 6px 20px rgba(93,64,55,0.55)">
          <span class="icon">♟</span>
          <div class="card-title">Chess</div>
          <span class="badge">2 Players</span>
          <span class="badge-mobile">📱 Mobile</span>
        </a>

        <!-- Add more 2-player cards here -->

      </div>

      <p class="section-label" style="margin-top:2.5rem;">Singleplayer Games</p>
      <div class="grid">

        <a class="card card-tag card-recommended" href="survive.html" style="background:linear-gradient(160deg,#27ae60,#145a32)">
          <span class="icon">🧟</span>
          <div class="card-title">Survive</div>
          <span class="badge">1 Player</span>
        </a>

        <a class="card card-tag" href="starclicker.html" style="background:linear-gradient(160deg,#1a1a4e,#0a0820);box-shadow:0 6px 20px rgba(100,80,255,0.45)">
          <span class="icon">⭐</span>
          <div class="card-title">Star Clicker</div>
          <span class="badge">1 Player</span>
        </a>

        <!-- Add more singleplayer cards here -->

      </div>
    </div>

  </div>

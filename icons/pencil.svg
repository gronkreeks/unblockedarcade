<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- eraser (pink) -->
  <rect x="22" y="4" width="20" height="9" rx="3" fill="rgba(255,170,170,0.9)"/>
  <!-- eraser band -->
  <rect x="22" y="12" width="20" height="3.5" fill="rgba(0,0,0,0.14)"/>
  <!-- pencil body -->
  <rect x="22" y="15" width="20" height="34" fill="white"/>
  <!-- wooden bevel at tip -->
  <path d="M22 49 L42 49 L32 61 Z" fill="rgba(205,165,100,0.75)"/>
  <!-- graphite tip -->
  <path d="M27 53 L37 53 L32 61 Z" fill="rgba(60,60,60,0.55)"/>
  <!-- side shading line on body -->
  <line x1="38" y1="15" x2="38" y2="49" stroke="rgba(0,0,0,0.07)" stroke-width="1.5"/>
</svg>

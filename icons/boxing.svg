<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- main glove body -->
  <rect x="10" y="8" width="46" height="28" rx="15" fill="white"/>
  <!-- lower palm -->
  <rect x="12" y="30" width="42" height="14" rx="5" fill="white"/>
  <!-- thumb bump on left -->
  <ellipse cx="10" cy="24" rx="9" ry="12" fill="white"/>
  <!-- cuff -->
  <rect x="17" y="43" width="30" height="13" rx="6" fill="white"/>
  <!-- cuff shade line -->
  <rect x="17" y="43" width="30" height="4" rx="0" fill="rgba(0,0,0,0.09)"/>
  <!-- knuckle dividers -->
  <line x1="26" y1="9" x2="26" y2="39" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"/>
  <line x1="40" y1="9" x2="40" y2="39" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"/>
</svg>

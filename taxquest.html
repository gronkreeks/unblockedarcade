<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAX QUEST: 30 Days to Lodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background:#04040f; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Courier New',monospace; overflow:hidden; }
  canvas { display:block; image-rendering:pixelated; cursor:default; }
</style>

<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=800, H=520;
canvas.width=W; canvas.height=H;

// ── SOUND (Web Audio API — no files needed) ───────────────────────────────────
let _AC=null;
function getAC(){if(!_AC)try{_AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _AC;}
function note(f,tp,v,st,dur){
  const ac=getAC();if(!ac)return;
  try{const g=ac.createGain();g.connect(ac.destination);g.gain.setValueAtTime(v,st);g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
    const o=ac.createOscillator();o.type=tp;o.frequency.value=f;o.connect(g);o.start(st);o.stop(st+dur+0.04);}catch(e){}
}
const VOICE={mum:370,fairy:530,boss:240,sam:295,govassist:460,atoofficer:275,teller:350,wizard:195,karen:415,ato:145};
function sfx(type,id){
  const ac=getAC();if(!ac)return;
  const t=ac.currentTime;
  switch(type){
    case 'dlg':{const f=(VOICE[id]||330)+(Math.random()*30|0)-15;note(f,'square',0.04,t,0.042);break;}
    case 'sel':  note(220,'square',0.07,t,0.06);break;
    case 'conf': note(440,'square',0.08,t,0.07);note(660,'square',0.08,t+0.08,0.09);break;
    case 'hit':  note(260,'sawtooth',0.14,t,0.06);note(130,'sawtooth',0.09,t+0.05,0.12);break;
    case 'xp':   note(440,'square',0.06,t,0.06);note(540,'square',0.06,t+0.06,0.07);break;
    case 'lvlup':[330,392,440,523,659].forEach((f,i)=>note(f,'square',0.09,t+i*0.08,0.1));break;
    case 'trans':note(180,'sawtooth',0.06,t,0.14);note(280,'sawtooth',0.05,t+0.1,0.18);break;
    case 'boss': note(110,'sawtooth',0.12,t,0.28);note(82,'sawtooth',0.1,t+0.22,0.32);break;
    case 'win':  [440,440,440,349,440,523,523].forEach((f,i)=>note(f,'square',0.08,t+i*0.09,0.11));break;
    case 'lose': [440,349,293,220].forEach((f,i)=>note(f,'sawtooth',0.08,t+i*0.12,0.14));break;
    case 'portal':for(let i=0;i<6;i++)note(200+i*60,'sine',0.05,t+i*0.055,0.11);break;
  }
}

const FLOOR=355, AREA_W=1800;
const AR={x:210,y:148,w:380,h:155}; // battle arena

// ── GAME STATE ────────────────────────────────────────────────────────────────
const G={
  scene:'title',
  px:180,facing:1,walkFrame:0,walkTimer:0,isWalking:false,camX:0,
  zoneIdx:0, visitedZones:new Set([0]),
  days:30,xp:0,
  tfn:false,myGovCreated:false,atoLinked:false,tfnDeclared:false,
  bankLinked:false,myDeductionsEnabled:false,deductionsLogged:0,
  workedShifts:0,incomeStatementChecked:false,taxEstimated:false,
  taxLodged:false,studiedTax:false,talkedToMum:false,
  income:0,taxWithheld:0,deductions:0,
  dlgLines:null,dlgPage:0,dlgCb:null,dlgChar:0,dlgSpeaker:null,
  transMsg:'',transSubMsg:'',transTimer:0,transAlpha:0,
  notif:null,notifTimer:0,notifColor:'#00aa44',
  keys:{},
  btl:null,
};

// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS=[{n:1,title:'Tax Baby',xp:0},{n:2,title:'Tax Toddler',xp:100},
  {n:3,title:'Tax Apprentice',xp:230},{n:4,title:'Tax Journeyman',xp:400},{n:5,title:'Tax Legend',xp:580}];
function curLevel(){let l=LEVELS[0];for(const x of LEVELS)if(G.xp>=x.xp)l=x;return l;}
function nextLevel(){const c=curLevel();return LEVELS.find(l=>l.n===c.n+1)||null;}
function gainXP(n,r){const b=curLevel();G.xp+=n;const a=curLevel();
  if(a.n>b.n){sfx('lvlup');popup(`LEVEL UP → ${a.title}! (+${n} XP)`,'#ffcc00');}
  else{sfx('xp');popup(`+${n} XP — ${r}`,'#00dd66');}}
function spendDay(d){G.days=Math.max(0,G.days-d);}
function popup(msg,c='#00aa44'){G.notif=msg;G.notifTimer=200;G.notifColor=c;}

// ── DIALOG ────────────────────────────────────────────────────────────────────
function openDlg(lines,cb,speaker){
  G.dlgLines=lines;G.dlgPage=0;G.dlgCb=cb||null;G.dlgSpeaker=speaker||null;G.dlgChar=0;G.scene='dialog';
}
function advDlg(){
  sfx('conf');G.dlgPage++;G.dlgChar=0;
  if(G.dlgPage>=G.dlgLines.length){G.dlgLines=null;G.scene='world';if(G.dlgCb){G.dlgCb();G.dlgCb=null;}}
}

// ── ZONES (Grasslands → myGov → Woolworths → ATO → CommBank → Tax Lodge) ─────
function makeZones(){return[

  // 0: RURAL GRASSLANDS
  {name:'Rural Grasslands',sky:['#89d4f5','#c8ebf8'],gnd:'#3a8a22',
    drawBg(cx){
      ctx.fillStyle='rgba(255,255,255,0.55)';
      for(let i=0;i<6;i++){const bx=((i*310-cx*0.18+1800)%2200)-100;ctx.beginPath();ctx.ellipse(bx,70+i%3*18,44,18,0,0,Math.PI*2);ctx.ellipse(bx+38,58+i%3*18,32,15,0,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#4caf50';
      for(let i=0;i<5;i++){const hx=((i*380-cx*0.45+3000)%3400)-200;ctx.beginPath();ctx.arc(hx,FLOOR+20,190+i*22,Math.PI,2*Math.PI);ctx.fill();}
      for(let i=0;i<28;i++){const fx=((i*65+15-cx)%1900)-30;if(fx<-20||fx>W+20)continue;
        ctx.fillStyle=i%3===0?'#ff6b6b':i%3===1?'#ffe66d':'#ff9ff3';ctx.fillRect(fx,FLOOR-12,6,6);
        ctx.fillStyle='#2ecc71';ctx.fillRect(fx+2,FLOOR-6,2,8);}
      ctx.save();const sg=ctx.createRadialGradient(720,55,8,720,55,38);
      sg.addColorStop(0,'#fff176');sg.addColorStop(1,'rgba(255,220,0,0)');
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(720,55,38,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe033';ctx.beginPath();ctx.arc(720,55,22,0,Math.PI*2);ctx.fill();ctx.restore();
    },
    npcs:[
      {id:'mum',x:420,label:'Mum',
        lines:["* Mum: Register your TFN at myGov first — and keep it private. TFN fraud lets criminals lodge fake returns and steal your refund. I did not raise a fraud victim.",
               "* Mum: Once linked, ATO Online Services shows your income, super balance, and flags fraud on your account. It's actually quite good.",
               "* Mum: Also — if anyone calls demanding payment by gift card, that is a scam. The real ATO only contacts you through myGov. Go."]},
      {id:'fairy',x:1100,label:'Tax Fairy',
        lines:["* Tax Fairy: ATO Online Services protects you from fraud — employer income verified, super contributions tracked, unauthorised access flagged.",
               "* Tax Fairy: I've watched scammers try to steal refunds from first-time taxpayers for centuries. ATO Online Services makes that much harder. Lodge on time. ✨"]}
    ],
    objs:[
      {id:'mailbox',x:1500,label:'Mailbox',
        act(){
          if(G.studiedTax){openDlg(["* [Tax Guide — already memorised]","* Tax-free threshold: $18,200. Lodge by 31 Oct via ATO Online Services. Keep every receipt."]);}
          else{G.studiedTax=true;spendDay(1);gainXP(10,'studying');
            openDlg(["* [A letter from the ATO — the real ATO, not a scam.]",
              "* 'Your TFN is your lifelong tax ID. Keep it private — TFN fraud lets criminals steal your refund. Tax-free threshold: $18,200. Lodge by 31 October via ATO Online Services.'",
              "* 'P.S. The real ATO never calls demanding payment by gift card or crypto. That is always a scam. Report it.' — The ATO\n\n  [+10 XP]"]);}
        }}
    ],
    done(){return G.studiedTax&&G.talkedToMum;},
    hint:"Talk to Mum and read the mailbox before leaving!",
  },

  // 1: myGOV DISTRICT
  {name:'myGov District',sky:['#000d1a','#001f4d'],gnd:'#0a1428',
    drawBg(cx){
      ctx.fillStyle='#001428';
      const bldgs=[{x:50,w:80,h:180},{x:160,w:60,h:220},{x:250,w:100,h:150},{x:400,w:70,h:200},{x:510,w:90,h:170},{x:640,w:80,h:240},{x:760,w:110,h:160}];
      for(const b of bldgs){const bx=((b.x-cx*0.25+3600)%3600)-100;ctx.fillRect(bx,FLOOR-b.h,b.w,b.h);
        ctx.fillStyle='rgba(100,160,255,0.3)';
        for(let wy=FLOOR-b.h+10;wy<FLOOR-20;wy+=22)for(let wx=bx+8;wx<bx+b.w-8;wx+=18)ctx.fillRect(wx,wy,10,14);
        ctx.fillStyle='#001428';}
      ctx.save();ctx.fillStyle='rgba(0,80,255,0.08)';ctx.beginPath();ctx.arc(W/2,180,120,0,Math.PI*2);ctx.fill();
      ctx.font="bold 28px 'Courier New',monospace";ctx.textAlign='center';
      ctx.fillStyle='#003087';ctx.fillText('myGov',W/2+2,192);ctx.fillStyle='#4a90ff';ctx.fillText('myGov',W/2,190);ctx.restore();
      for(let i=0;i<80;i++){const b2=((i*47+9)%100)/100;ctx.fillStyle=`rgba(200,220,255,${b2*0.6})`;ctx.fillRect((i*97+33)%W,(i*73+11)%240,1,1);}
    },
    npcs:[
      {id:'govassist',x:600,label:'ARIA-7 (Portal AI)',
        lines:["* ARIA-7: TFN terminal. myGov kiosk. ATO link. Left to right. In order. 4,000 Jakes. 3,847 skipped a step. Don't.",
               "* ARIA-7: ATO Online Services — once linked — gives you income statements, myTax lodgement, myDeductions via the ATO app, super balance, and fraud monitoring on your account.",
               "* ARIA-7: It also verifies your identity. Scammers cannot access ATO Online Services without your myGov login. That is the point."]}
    ],
    objs:[
      {id:'tfnterm',x:250,label:'TFN Terminal',
        act(){
          if(G.tfn){openDlg(["* [TFN Terminal]","* TFN: 123 456 789 ✅ — Already registered."]);}
          else{G.tfn=true;spendDay(1);gainXP(50,'TFN registration');
            openDlg(["* [ATO TFN Registration Terminal]",
              "* TAX FILE NUMBER REGISTERED ✅\n  Your TFN: 123 456 789",
              "* ⚠️  Guard this from fraud — TFN fraud lets scammers lodge fake returns in your name and steal your refund.\n\n  Only share with your employer, bank, or a government agency.\n\n  ATO Online Services monitors your TFN for unauthorised activity.\n\n  [+50 XP]"]);}
        }},
      {id:'mygovsign',x:850,label:'myGov Sign-up',
        act(){
          if(!G.tfn){openDlg(["* [myGov Kiosk]","* Register your TFN at the left terminal first — you need it to create an account."]);}
          else if(G.myGovCreated){openDlg(["* [myGov — Active ✅]",`* Logged in as Jake. ATO linked: ${G.atoLinked?'✅':'❌ use the right terminal'}`]);}
          else{G.myGovCreated=true;spendDay(1);gainXP(30,'myGov account');
            openDlg(["* [myGov Account Created ✅]",
              "* Your single secure login for ATO Online Services, Centrelink, and Medicare.",
              "* myGov uses identity verification to protect you from fraud. The real ATO only sends official messages through your myGov inbox — never unsolicited calls or texts.\n\n  Link the ATO using the terminal to the right.\n\n  [+30 XP]"]);}
        }},
      {id:'atolink',x:1450,label:'ATO Link Terminal',
        act(){
          if(!G.myGovCreated){openDlg(["* [ATO Link Terminal]","* Create your myGov account first — use the sign-up kiosk to the left."]);}
          else if(G.atoLinked){openDlg(["* [ATO Linked ✅]","* ATO Online Services is accessible via myGov — income statements, myTax, myDeductions, all there."]);}
          else{G.atoLinked=true;spendDay(1);gainXP(40,'ATO linked');
            openDlg(["* [ATO LINKED TO myGov ✅]",
              "* ATO Online Services is now accessible! This is how Australians manage tax and super securely.",
              "* Unlocked via ATO Online Services:\n  • Income statements (employer-lodged, fraud-checked)\n  • myTax — safe lodgement, pre-filled to reduce fraud\n  • myDeductions — via the ATO app\n  • Super balance and contribution history\n  • Fraud monitoring on your TFN and account\n\n  [+40 XP]"]);}
        }}
    ],
    done(){return G.tfn&&G.atoLinked;},
    hint:"Register your TFN and link the ATO to myGov!",
  },

  // 2: WOOLWORTHS
  {name:'Woolworths',sky:['#0d1520','#0d1520'],gnd:'#1e1e2a',
    drawBg(cx){
      ctx.fillStyle='#12121e';ctx.fillRect(0,0,W,55);
      for(let i=0;i<5;i++){const lx=80+i*155-(cx%155);ctx.fillStyle='rgba(255,255,200,0.12)';ctx.beginPath();ctx.ellipse(lx,90,22,60,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fffce0';ctx.fillRect(lx-10,30,20,10);}
      for(let tx=0;tx<W;tx+=56){ctx.fillStyle=(Math.floor((tx+(cx%56))/56)+Math.floor(FLOOR/56))%2===0?'#252535':'#1e1e2e';ctx.fillRect(tx-(cx%56),FLOOR,56,H);}
      ctx.fillStyle='#1a2a1a';
      for(let s=0;s<4;s++){const sx=120+s*190-(cx*0.3%200);ctx.fillRect(sx,120,140,180);ctx.fillStyle='#2a3a2a';ctx.fillRect(sx,155,140,6);ctx.fillRect(sx,205,140,6);ctx.fillRect(sx,255,140,6);
        for(let p=0;p<4;p++){ctx.fillStyle=['#e74c3c','#3498db','#f1c40f','#2ecc71'][p];ctx.fillRect(sx+10+p*30,162,22,40);ctx.fillRect(sx+10+p*30,212,22,40);}ctx.fillStyle='#1a2a1a';}
      ctx.save();ctx.fillStyle='#1a6b1a';ctx.fillRect(0,0,W,38);
      ctx.font="bold 22px 'Courier New',monospace";ctx.textAlign='center';ctx.fillStyle='#ffffff';ctx.fillText('WOOLWORTHS',W/2,26);ctx.restore();
    },
    npcs:[
      {id:'boss',x:550,label:'Boss',
        lines:["* Boss: TFN sorted. Good. Keep it private — last employee handed theirs to a scammer. Full identity fraud. Nightmare.",
               "* Boss: Register 3. Karen awaits. Good luck out there. I'm sorry."]},
      {id:'sam',x:1300,label:'Coworker Sam',
        lines:["* Sam: Three words: keep your receipts. Log them in the ATO app — syncs straight to ATO Online Services.",
               "* Sam: The ATO app has myDeductions. Use it. Documented claims = refund money. Undocumented = fraud flag in an audit. Learn from my mistakes."]}
    ],
    objs:[
      {id:'tfndecl',x:300,label:'TFN Declaration',
        act(){
          if(!G.tfn){openDlg(["* [TFN Declaration form]","* You need a TFN before you can fill this in — head to myGov District."]);}
          else if(G.tfnDeclared){openDlg(["* [TFN Declaration — SUBMITTED ✅]","* You've claimed the tax-free threshold — Woolworths withholds at the correct rate now."]);}
          else{G.tfnDeclared=true;spendDay(1);gainXP(30,'TFN Declaration');
            openDlg(["* [You submit the TFN Declaration!]","* TFN 123 456 789 on file with Woolworths ✅\n\n  You've claimed the TAX-FREE THRESHOLD — no tax on your first $18,200. PAYG withholding is now set correctly.\n\n  [+30 XP]"]);}
        }},
      {id:'register',x:850,label:'Work Register (BATTLE)',
        act(){
          if(!G.tfn){openDlg(["* [Work Register]","* You need a TFN before you can work — head to myGov District first."]);}
          else if(G.workedShifts>=5){openDlg(["* [Work Register]","* You've worked enough shifts — move on."]);}
          else{startBattle();}
        }}
    ],
    done(){return G.tfnDeclared&&G.workedShifts>=3;},
    hint:"Submit the TFN Declaration and survive 3 shifts at the register!",
  },

  // 3: ATO HEIGHTS
  {name:'ATO Heights',sky:['#100020','#1a0038'],gnd:'#120820',
    drawBg(cx){
      ctx.fillStyle='#1e0835';
      for(let i=0;i<8;i++){const colx=((i*200-cx*0.4+3200)%3200)-60;ctx.fillRect(colx,60,40,FLOOR-60);ctx.fillStyle='#2a1050';ctx.fillRect(colx-8,55,56,18);ctx.fillStyle='#1e0835';}
      ctx.save();ctx.fillStyle='#0e0025';ctx.fillRect(0,0,W,60);
      ctx.font="bold 20px 'Courier New',monospace";ctx.textAlign='center';
      ctx.fillStyle='#6a1b9a';ctx.fillText('AUSTRALIAN TAXATION OFFICE',W/2+2,36);
      ctx.fillStyle='#ce93d8';ctx.fillText('AUSTRALIAN TAXATION OFFICE',W/2,34);ctx.restore();
      ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#9c27b0';ctx.fillRect(0,FLOOR-20,W,30);ctx.restore();
    },
    npcs:[
      {id:'atoofficer',x:400,label:'Officer Hensley',
        lines:["* Hensley: ATO Online Services already received your income data from Woolworths. We cross-check it for fraud and pre-fill it into your return. I'm just waiting for you to agree.",
               "* Hensley: Activate myDeductions in the ATO app. Log your three expenses. Check the pre-filled income statement — verify your super contributions too.",
               "* Hensley: Then run the estimator. Undeclared income is fraud. Yours is declared. That is refreshing. You may then pass."]}
    ],
    objs:[
      {id:'myded',x:240,label:'myDeductions',
        act(){
          if(G.myDeductionsEnabled){openDlg(["* [myDeductions ✅]",`* ${G.deductionsLogged}/3 deductions logged — $${G.deductions} total claimed.`]);}
          else{G.myDeductionsEnabled=true;spendDay(1);gainXP(25,'myDeductions');
            openDlg(["* [myDeductions ACTIVATED via ATO app ✅]",
              "* The ATO app lets you log work expenses throughout the year. At tax time they sync directly into ATO Online Services and auto-import into myTax.",
              "* Keep every receipt — undocumented claims can trigger a fraud flag during an audit. ATO Online Services cross-checks your claims against employer and bank data.\n\n  [+25 XP]"]);}
        }},
      {id:'ded1',x:580,label:'Work Boots ($55)',
        act(){
          if(!G.myDeductionsEnabled){openDlg(["* [Work boots]","* Activate myDeductions first."]);}
          else if(G.deductionsLogged>=1){openDlg(["* [Boots — CLAIMED ✅]","* $55 logged."]);}
          else{G.deductionsLogged=1;G.deductions+=55;spendDay(1);gainXP(20,'deduction');
            openDlg(["* [Non-slip work boots — $55 claimed!]",`* Deductions reduce your taxable income directly — $55 off means less tax owed, more refund back.\n\n  Total: $${G.deductions}  [+20 XP]`]);}
        }},
      {id:'ded2',x:880,label:'Dry Cleaning ($40)',
        act(){
          if(!G.myDeductionsEnabled){openDlg(["* [Uniform]","* Activate myDeductions first."]);}
          else if(G.deductionsLogged<1){openDlg(["* [Uniform]","* Log the boots deduction first."]);}
          else if(G.deductionsLogged>=2){openDlg(["* [Dry cleaning — CLAIMED ✅]","* $40 logged."]);}
          else{G.deductionsLogged=2;G.deductions+=40;spendDay(1);gainXP(20,'deduction');
            openDlg(["* [Uniform dry cleaning — $40 claimed!]",`* Total deductions: $${G.deductions}  [+20 XP]`]);}
        }},
      {id:'ded3',x:1100,label:'Bus Travel ($60)',
        act(){
          if(!G.myDeductionsEnabled){openDlg(["* [Bus pass]","* Activate myDeductions first."]);}
          else if(G.deductionsLogged<2){openDlg(["* [Bus pass]","* Log the previous deductions first."]);}
          else if(G.deductionsLogged>=3){openDlg(["* [Bus travel — CLAIMED ✅]","* $60 logged."]);}
          else{G.deductionsLogged=3;G.deductions+=60;spendDay(1);gainXP(20,'deduction');
            openDlg(["* [Public transport — $60 claimed!]",`* All 3 deductions complete! Total: $${G.deductions}  [+20 XP]`]);}
        }},
      {id:'incstmt',x:1360,label:'Income Statement',
        act(){
          if(G.workedShifts<3){openDlg(["* [Income Statement Terminal]",`* Only ${G.workedShifts} shift(s) on record — work at least 3 at Woolworths first.`]);}
          else if(G.incomeStatementChecked){openDlg(["* [Income Statement ✅]",`* Gross: $${G.income}  Withheld: $${G.taxWithheld}  Super: $${Math.round(G.income*0.115)}`]);}
          else{G.incomeStatementChecked=true;spendDay(1);gainXP(35,'income statement');
            openDlg(["* [INCOME STATEMENT — via ATO Online Services ✅]",
              `* Gross: $${G.income}  PAYG withheld: $${G.taxWithheld}  Super: $${Math.round(G.income*0.115)}`,
              "* Woolworths lodged this data directly with ATO Online Services. It's pre-filled into myTax AND cross-checked for payroll fraud and errors.\n\n  If the amounts look wrong, it may indicate fraud or a payroll mistake. Always review before lodging.\n\n  [+35 XP]"]);}
        }},
      {id:'taxest',x:1620,label:'Tax Estimator',
        act(){
          if(!G.incomeStatementChecked){openDlg(["* [Tax Estimator]","* Check your income statement first."]);}
          else if(G.taxEstimated){const tx=Math.max(0,G.income-G.deductions),ow=tx>18200?Math.round((tx-18200)*0.16):0;openDlg([`* Estimated refund: $${Math.max(0,G.taxWithheld-ow)} 🎉`]);}
          else{G.taxEstimated=true;spendDay(1);gainXP(25,'estimate');
            const tx=Math.max(0,G.income-G.deductions),ow=tx>18200?Math.round((tx-18200)*0.16):0,ref=G.taxWithheld-ow;
            openDlg(["* [ATO Income Tax Estimator 2025–26]",`* Gross: $${G.income}  Deductions: -$${G.deductions}  Taxable: $${tx}`,`* Tax owed (16% above $18,200): $${ow}  Already withheld: $${G.taxWithheld}\n\n  ESTIMATED REFUND: $${Math.max(0,ref)} 🎉\n\n  [+25 XP]`]);}
        }}
    ],
    done(){return G.myDeductionsEnabled&&G.deductionsLogged>=3&&G.incomeStatementChecked&&G.taxEstimated;},
    hint:"Activate myDeductions, log all 3 deductions, check income statement & run estimator!",
  },

  // 4: COMMBANK VALLEY
  {name:'CommBank Valley',sky:['#120c00','#1e1400'],gnd:'#150f00',
    drawBg(cx){
      ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#ff8800';ctx.fillRect(0,0,W,H);ctx.restore();
      ctx.fillStyle='#1a1200';

function txt(t,x,y,sz,col,al='left'){ctx.save();ctx.font=`${sz}px 'Courier New',monospace`;ctx.fillStyle=col;ctx.textAlign=al;ctx.fillText(t,x,y);ctx.restore();}
function rr(x,y,w,h,r,fill,stroke,sw=2){if(w<=0||h<=0)return;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}}
function wrapText(str,maxW,sz=15){ctx.font=`${sz}px 'Courier New',monospace`;const out=[];for(const para of str.split('\n')){if(!para.trim()){out.push('');continue;}let line='';for(const w of para.split(' ')){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){out.push(line);line=w;}else line=t;}if(line)out.push(line);}return out;}

// Inline-colour renderer — auto-highlights key terms wherever they appear in dialog
// Blue   (#4488ff): ATO Online Services, ATO app  (important service names)
// Gold   (#ffd700): $amounts, percentages, $18,200 threshold
// Cyan   (#55eeff): TFN, ATO, myGov, myTax, myDeductions, PAYG, CommBank, Woolworths
// Red-orange (#ff5533): fraud, scam, identity theft, unauthorised  (danger!)
// Orange (#ff7744): penalty, withheld, audit  (cost / warning words)
// Yellow (#ffee44): * speech prefix, MUST, deadline, October
// Brackets [text] → cyan
function richLine(line,lx,ly,sz,defaultCol){
  ctx.save();ctx.font=`${sz}px 'Courier New',monospace`;ctx.textAlign='left';
  const segs=[];let s=line;
  if(s.startsWith('* ')){segs.push(['* ','#ffee44']);s=s.slice(2);}
  // IMPORTANT: longer phrases must come FIRST so they match before single-word fallbacks
  const re=/(ATO Online Services|ATO app)|(\$[\d,]+(?:\.\d+)?)|(\[.*?\])|\b(TFN|ATO|myGov|myTax|myDeductions|PAYG|Medicare|CommBank|Woolworths|superannuation|super)\b|\b(fraud|scam\w*|identity\s*theft|unauthorised|stolen)\b|\b(penalty|penalt\w*|withheld|withhold\w*|audit\w*)\b|\b(MUST|deadline|October|31st)\b|(\d+%|\$18[,.]?200|\$18200)/g;
  let last=0,m;
  while((m=re.exec(s))!==null){
    if(m.index>last)segs.push([s.slice(last,m.index),defaultCol]);
    const tok=m[0];
    let col=defaultCol;
    if     (m[1])       col='#4488ff';   // ATO Online Services / ATO app → brand blue
    else if(m[2]||m[9]) col='#ffd700';  // money / % / threshold → gold
    else if(m[3]||m[4]) col='#55eeff';  // bracket / tax/super term → cyan
    else if(m[5])       col='#ff5533';  // fraud / scam → red-orange
    else if(m[6])       col='#ff7744';  // danger word → orange
    else if(m[7])       col='#ffee44';  // imperative → yellow
    segs.push([tok,col]);
    last=m.index+tok.length;
  }
  if(last<s.length)segs.push([s.slice(last),defaultCol]);
  let cx=lx;
  for(const[t,c]of segs){ctx.fillStyle=c;ctx.fillText(t,cx,ly);cx+=ctx.measureText(t).width;}
  ctx.restore();
}

  else if(p.type==='audit'){ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,p.w,p.h);ctx.save();ctx.font=`bold 9px 'Courier New',monospace`;ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillText('AUDIT',p.x+p.w/2,p.y+p.h-2);ctx.restore();}

// heart extents from (cx,cy): left=7, right=7, top=2, bottom=11  → 14w × 13h ≈ 1:1
const HR={L:7,R:7,T:2,B:11};
function drawHeart(cx,cy,col){
  ctx.fillStyle=col;
  ctx.fillRect(cx-6,cy-2,5,4); ctx.fillRect(cx+1,cy-2,5,4); // lobes
  ctx.fillRect(cx-7,cy+2,14,3); // wide middle
  ctx.fillRect(cx-5,cy+5,10,2); // taper 1
  ctx.fillRect(cx-3,cy+7,6,2);  // taper 2
  ctx.fillRect(cx-1,cy+9,2,2);  // tip
}

function updateBattle(){
  if(G.scene!=='battle')return;
  const b=G.btl;
  if(b.phase==='intro'){b.introTimer++;if(b.introTimer>80)b.phase='menu';return;}
  if(b.phase!=='dodge')return;
  // heart movement
  const sp=3;
  if(G.keys['arrowleft']||G.keys['a']) b.hx-=sp;
  if(G.keys['arrowright']||G.keys['d']) b.hx+=sp;
  if(G.keys['arrowup']||G.keys['w']) b.hy-=sp;
  if(G.keys['arrowdown']||G.keys['s']) b.hy+=sp;
  // hard barrier — clamp using exact visual extents so heart never clips the border
  b.hx=Math.max(AR.x+HR.L, Math.min(AR.x+AR.w-HR.R, b.hx));
  b.hy=Math.max(AR.y+HR.T, Math.min(AR.y+AR.h-HR.B, b.hy));
  // projectile physics
  for(const p of b.projectiles){
    p.x+=p.vx;p.y+=p.vy;
    if((p.type==='form'||p.type==='tag')&&(p.y+p.h>AR.y+AR.h)&&p.vy>0)p.vy=-Math.abs(p.vy);
    if((p.type==='form')&&p.y<AR.y&&p.vy<0)p.vy=Math.abs(p.vy);
  }
  // collision (4px inner box — slightly forgiving vs visual)
  if(b.hitFlash<=0){
    for(const p of b.projectiles){
      if(b.hx+4>p.x+2&&b.hx-4<p.x+p.w-2&&b.hy+4>p.y+2&&b.hy-4<p.y+p.h-2){
        b.hp=Math.max(0,b.hp-14);b.hitFlash=30;sfx('hit');break;
      }
    }
  }
  if(b.hitFlash>0)b.hitFlash--;
  b.dodgeTimer++;
  if(b.dodgeTimer>=b.maxDodgeTime){
    b.turn++;
    if(b.turn>=b.maxTurns){b.phase='end';}
    else{b.phase='between';b.hp=Math.min(b.maxHp,b.hp+35);}
  }
}

  }

// ── UPDATE WORLD ──────────────────────────────────────────────────────────────
function updateWorld(){
  if(G.scene!=='world')return;
  let mv=false;
  if(G.keys['a']||G.keys['arrowleft']){G.px-=3;G.facing=-1;mv=true;}
  if(G.keys['d']||G.keys['arrowright']){G.px+=3;G.facing=1;mv=true;}
  G.isWalking=mv;if(mv)G.walkFrame=++G.walkTimer;
  G.px=Math.max(40,Math.min(AREA_W-40,G.px));
  G.camX=Math.max(0,Math.min(AREA_W-W,G.px-W*0.38));

  if(G.px>=AREA_W-44){
    const zone=ZONES[G.zoneIdx];
    if(zone.done()){
      if(G.zoneIdx<ZONES.length-1){
        const ni=G.zoneIdx+1,first=!G.visitedZones.has(ni);
        if(first){spendDay(ZONE_COST[ni]);G.visitedZones.add(ni);}
        sfx('trans');G.zoneIdx=ni;G.px=120;G.camX=0;
        if(first){G.transMsg=`${G.days} days til tax time!`;G.transSubMsg=`Entering: ${ZONES[ni].name}`;G.scene='transition';G.transTimer=200;G.transAlpha=0;}
        else{G.transMsg=ZONES[ni].name;G.transSubMsg=`${G.days} days remaining`;G.scene='transition';G.transTimer=120;G.transAlpha=0;}
      }
    } else {G.px=AREA_W-50;popup(ZONES[G.zoneIdx].hint,'#ff7700');}
  }
  if(G.px<=42&&G.zoneIdx>0){
    G.zoneIdx--;G.px=AREA_W-120;G.camX=AREA_W-W;
    G.transMsg=ZONES[G.zoneIdx].name;G.transSubMsg=`${G.days} days remaining`;G.scene='transition';G.transTimer=110;G.transAlpha=0;
  }
}

function tryInteract(){
  if(G.scene!=='world')return;
  const zone=ZONES[G.zoneIdx],pw=G.px;
  for(const n of zone.npcs){
    if(Math.abs(n.x-pw)<62){
      const cb=n.id==='mum'?()=>{G.talkedToMum=true;}:null;
      openDlg(n.lines,cb,n.id);return;
    }
  }
  for(const o of zone.objs){if(Math.abs(o.x-pw)<62){o.act();return;}}
}

    scene:'title',px:180,facing:1,walkFrame:0,walkTimer:0,isWalking:false,camX:0,
    zoneIdx:0,visitedZones:new Set([0]),days:30,xp:0,
    tfn:false,myGovCreated:false,atoLinked:false,tfnDeclared:false,
    bankLinked:false,myDeductionsEnabled:false,deductionsLogged:0,
    workedShifts:0,incomeStatementChecked:false,taxEstimated:false,
    taxLodged:false,studiedTax:false,talkedToMum:false,
    income:0,taxWithheld:0,deductions:0,
    dlgLines:null,dlgPage:0,dlgCb:null,dlgChar:0,dlgSpeaker:null,
    transMsg:'',transSubMsg:'',transTimer:0,transAlpha:0,

// ── INPUT ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  G.keys[e.key.toLowerCase()]=true;
  const k=e.key.toLowerCase();
  if(k==='z'||k===' '||k==='enter'){
    e.preventDefault();
    if(G.scene==='title'){G.zoneIdx=0;G.px=180;G.camX=0;G.transMsg='30 days til tax time!';G.transSubMsg='Entering: Rural Grasslands';G.scene='transition';G.transTimer=180;G.transAlpha=0;return;}
    if(G.scene==='win'||G.scene==='lose'){resetGame();return;}
    if(G.scene==='dialog'){
      // skip typewriter first, then advance on second press
      const tw=dlgTextW();
      const lines=wrapText(G.dlgLines[G.dlgPage]||'',tw,15);
      const totalChars=lines.reduce((a,l)=>a+l.length,0);
      if(G.dlgChar<totalChars){G.dlgChar=totalChars;}else{advDlg();}
      return;
    }
    if(G.scene==='world'){tryInteract();return;}
    if(G.scene==='battle'){
      const b=G.btl;
      if(b.phase==='menu'){
        if(b.menuSel===0){spawnProjectiles(b.turn);b.dodgeTimer=0;b.hx=AR.x+AR.w/2;b.hy=AR.y+AR.h/2;b.phase='dodge';}
        else{G.btl=null;G.scene='world';popup('You quit the shift.','#ff8800');}
      } else if(b.phase==='between'){
        spawnProjectiles(b.turn);b.dodgeTimer=0;b.hx=AR.x+AR.w/2;b.hy=AR.y+AR.h/2;b.phase='dodge';
      } else if(b.phase==='end'){
        const won=b.hp>0;
        if(b.enemy==='ato'){
          G.taxLodged=true;spendDay(1);gainXP(won?200:80,'lodging tax return');
          sfx('win');G.btl=null;G.scene='win';
        } else {
          const earned=won?300:150;
          G.workedShifts++;G.income+=earned;
          const wh=G.tfnDeclared?Math.round(earned*0.093):Math.round(earned*0.47);
          G.taxWithheld+=wh;spendDay(1);gainXP(won?20:8,won?'surviving the shift':'surviving... barely');
          sfx('conf');G.btl=null;G.scene='world';
          popup(`Shift ${G.workedShifts}/3 — +$${earned} (withheld $${wh})`,'#00dd66');
        }
      }
      return;
    }
  }
  // battle menu cursor
  if(G.scene==='battle'&&G.btl&&G.btl.phase==='menu'){
    if(k==='a'||k==='arrowleft'){G.btl.menuSel=0;sfx('sel');}
    if(k==='d'||k==='arrowright'){G.btl.menuSel=1;sfx('sel');}
  }
});
window.addEventListener('keyup',e=>{G.keys[e.key.toLowerCase()]=false;});

canvas.addEventListener('click',e=>{
  if(G.scene==='title'){G.zoneIdx=0;G.px=180;G.camX=0;G.transMsg='30 days til tax time!';G.transSubMsg='Entering: Rural Grasslands';G.scene='transition';G.transTimer=180;G.transAlpha=0;return;}
  if(G.scene==='win'||G.scene==='lose'){resetGame();return;}
  if(G.scene==='dialog'){
    const tw=dlgTextW();
    const lines=wrapText(G.dlgLines[G.dlgPage]||'',tw,15);
    const totalChars=lines.reduce((a,l)=>a+l.length,0);
    if(G.dlgChar<totalChars){G.dlgChar=totalChars;}else{advDlg();}
    return;
  }
  if(G.scene==='world'){
    const r=canvas.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width)+G.camX;
    const zone=ZONES[G.zoneIdx];
    for(const n of zone.npcs){if(Math.abs(n.x-mx)<62){const cb=n.id==='mum'?()=>{G.talkedToMum=true;}:null;openDlg(n.lines,cb,n.id);return;}}
    for(const o of zone.objs){if(Math.abs(o.x-mx)<62){o.act();return;}}
  }
});

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  if(G.notifTimer>0)G.notifTimer--;
  if((G.scene==='world'||G.scene==='battle')&&G.days<=0&&!G.taxLodged)G.scene='lose';

  // typewriter advance
  if(G.scene==='dialog'&&G.dlgLines){
    const tw=dlgTextW();
    const lines=wrapText(G.dlgLines[G.dlgPage]||'',tw,15);
    const total=lines.reduce((a,l)=>a+l.length,0);
    if(G.dlgChar<total){
      const prev=Math.floor(G.dlgChar);
      G.dlgChar=Math.min(G.dlgChar+1.6,total);
      if(Math.floor(G.dlgChar)>prev&&Math.floor(G.dlgChar)%2===0) sfx('dlg',G.dlgSpeaker);
    }
  }

  updateWorld();
  updateBattle();
  switch(G.scene){
    case 'title':      drawTitle();break;
    case 'world':      drawWorld();drawHUD();drawNotif();break;
    case 'dialog':     drawWorld();drawHUD();drawDlg();drawNotif();break;
    case 'transition': drawTransition();break;
    case 'battle':     drawBattle();drawHUD();drawNotif();break;
    case 'win':        drawWin();break;
    case 'lose':       drawLose();break;
  }
  requestAnimationFrame(loop);
}

function resize(){const sc=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=`${W*sc}px`;canvas.style.height=`${H*sc}px`;}
window.addEventListener('resize',resize);resize();
loop();
</script>
</body>
